name: bookly_pro
description: "Bookly Pro"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/categories/
    - assets/onboarding/
    - assets/social/
    - assets/services/
    - assets/profile/
    - assets/system/
    - assets/data/categories.json
    - assets/data/services.json
    - assets/data/profile.json


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

  macos:
    generate: true
    image_path: "assets/icon.png"